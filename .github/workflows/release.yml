name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release
        run: xcodebuild -scheme Mater -configuration Release build -derivedDataPath build/DerivedData

      - name: Create DMG
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/Mater.app"
          DMG_PATH="Mater-${{ inputs.version }}.dmg"
          hdiutil create -volname "Mater" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          body: |
            ## Installation

            1. Download the `.dmg` file below
            2. Open the DMG and drag Mater to Applications
            3. **Important:** Before first launch, run this command in Terminal:
               ```
               xattr -cr /Applications/Mater.app
               ```
            4. Open Mater from Applications
          files: Mater-${{ inputs.version }}.dmg
