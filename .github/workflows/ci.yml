name: CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild -scheme Mater -configuration Debug build -derivedDataPath build/DerivedData

      - name: Test
        run: xcodebuild test -scheme Mater -configuration Debug -derivedDataPath build/DerivedData
